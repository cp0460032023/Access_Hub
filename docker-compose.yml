version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: access_hub_backend
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: access_hub
      JWT_SECRET: access_hub_secret_key_2024
      JWT_EXPIRES_IN: 24h
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: access_hub_frontend
    ports:
      - '80:80'
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: access_hub_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: access_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: