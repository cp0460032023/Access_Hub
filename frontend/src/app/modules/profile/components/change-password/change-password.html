<div class="password-container">
  <nav class="navbar">
    <div class="nav-brand">
      <button class="btn-back" (click)="goBack()">← Volver</button>
      <h2>Cambiar Contraseña</h2>
    </div>
  </nav>

  <div class="content">
    <div class="form-card">
      <div class="card-header">
        <div class="lock-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h3>Actualizar contraseña</h3>
      </div>

      <div class="success-alert" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Contraseña actual</label>
          <input
            type="password"
            formControlName="currentPassword"
            placeholder="Ingresa tu contraseña actual"
            [class.error]="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched"
          />
          <span class="error-msg" *ngIf="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched">
            Mínimo 8 caracteres
          </span>
        </div>

        <div class="form-group">
          <label>Nueva contraseña</label>
          <input
            type="password"
            formControlName="newPassword"
            placeholder="Mínimo 8 caracteres"
            [class.error]="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched"
          />
          <span class="error-msg" *ngIf="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched">
            Mínimo 8 caracteres
          </span>
        </div>

        <div class="form-group">
          <label>Confirmar nueva contraseña</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Repite la nueva contraseña"
            [class.error]="passwordForm.get('confirmPassword')?.touched && passwordForm.hasError('passwordMismatch')"
          />
          <span class="error-msg" *ngIf="passwordForm.get('confirmPassword')?.touched && passwordForm.hasError('passwordMismatch')">
            Las contraseñas no coinciden
          </span>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="goBack()">Cancelar</button>
          <button type="submit" class="btn-submit" [disabled]="passwordForm.invalid || isLoading">
            {{ isLoading ? 'Guardando...' : 'Cambiar contraseña' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
